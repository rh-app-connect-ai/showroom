- route:
    id: cors
    from:
      uri: direct:cors
      steps:
        - to: log:test?showAll=true
        - setHeader:
            name: Access-Control-Allow-Origin
            simple:
              expression: "*"
        - setHeader:
            name: Access-Control-Allow-Headers
            simple:
              expression: "user"

- route:
    id: status
    description: status
    from:
      uri: platform-http
      parameters:
        path: /status
      steps:
        - to:
            uri: direct:cors
        - setBody:
            simple:
              expression: ok
        - log:
            message: ${body}

- route:
    from:
      uri: platform-http
      parameters:
        path: /credentials/im
      steps:
        - to:
            uri: direct:cors
        # - to:
        #     uri: language:constant:resource:file:/etc/camel/resources.d/_secrets/im-credentials/im_credentials.json
        - setBody:
            constant: |
              [
                {"name": "user1", "password": "ezG4jBA4"},
                {"name": "user2", "password": "kwmiUhCN"},
                {"name": "user3", "password": "eQvz8XaG"},
                {"name": "user11", "password": "tKp7mNx2"}
              ]
        - setBody:
            jq:
              expression: '.[] | select(.name == header("user")) | .password'


