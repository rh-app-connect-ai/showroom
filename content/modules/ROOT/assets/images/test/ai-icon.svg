<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- head -->
  <rect x="22" y="20" width="56" height="50" rx="12" fill="#f5f5f5" stroke="#EE0000" stroke-width="2.5"/>
  <!-- eyes -->
  <circle cx="38" cy="42" r="6" fill="#EE0000" opacity="0.85"/>
  <circle cx="62" cy="42" r="6" fill="#EE0000" opacity="0.85"/>
  <!-- eye glints -->
  <circle cx="36" cy="40" r="2" fill="#fff"/>
  <circle cx="60" cy="40" r="2" fill="#fff"/>
  <!-- mouth -->
  <rect x="36" y="56" width="28" height="4" rx="2" fill="#EE0000" opacity="0.5"/>
  <!-- antenna -->
  <line x1="50" y1="20" x2="50" y2="10" stroke="#EE0000" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="50" cy="8" r="4" fill="#EE0000" opacity="0.7"/>
  <!-- ear left -->
  <rect x="14" y="36" width="8" height="14" rx="3" fill="#EE0000" opacity="0.5"/>
  <!-- ear right -->
  <rect x="78" y="36" width="8" height="14" rx="3" fill="#EE0000" opacity="0.5"/>
  <!-- neck -->
  <rect x="42" y="70" width="16" height="8" rx="2" fill="#EE0000" opacity="0.4"/>
  <!-- shoulders -->
  <rect x="28" y="78" width="44" height="10" rx="4" fill="#EE0000" opacity="0.3"/>
</svg>
