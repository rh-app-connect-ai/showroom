<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- ticket body -->
  <rect x="10" y="20" width="80" height="55" rx="6" fill="#f5f5f5" stroke="#EE0000" stroke-width="2.5"/>
  <!-- notch left -->
  <circle cx="10" cy="47" r="8" fill="white" stroke="#EE0000" stroke-width="2.5"/>
  <!-- notch right -->
  <circle cx="90" cy="47" r="8" fill="white" stroke="#EE0000" stroke-width="2.5"/>
  <!-- dashed perforation line -->
  <line x1="30" y1="20" x2="30" y2="75" stroke="#EE0000" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- stub text lines -->
  <line x1="16" y1="35" x2="24" y2="35" stroke="#EE0000" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="42" x2="24" y2="42" stroke="#EE0000" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="16" y1="55" x2="24" y2="55" stroke="#EE0000" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="62" x2="24" y2="62" stroke="#EE0000" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- main content lines -->
  <line x1="38" y1="34" x2="78" y2="34" stroke="#EE0000" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="38" y1="43" x2="72" y2="43" stroke="#EE0000" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="38" y1="52" x2="75" y2="52" stroke="#EE0000" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- ticket number -->
  <text x="58" y="68" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#EE0000" opacity="0.7">#1025</text>
</svg>
