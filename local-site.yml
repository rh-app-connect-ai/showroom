---
site:
  title: AI Data Flows & Application Connectivity
  url: https://github.com/rh-app-connect-ai
  start_page: modules::index.adoc
  keys:
    google_analytics: 'G-CFX85CRBQW'
content:
  sources:
    - url: .
      start_path: content

asciidoc:
  attributes:
    username: user11
    url-docserver: http://localhost:9090

  extensions:
    - ./content/lib/room-macro.js

ui:
  bundle:
    # url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/v0.0.1/ui-bundle.zip
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/rh-summit-2025/ui-bundle.zip
    snapshot: true # forced pull of the bundle
  supplemental_files:
    - path: ./content/lib
    - path: .nojekyll
    - path: ui.yml
      contents: "static_files: [ .nojekyll ]"
    - path: partials/head-icons.hbs
      contents: "<link rel=\"icon\" href=\"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23ee0000'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='Arial,sans-serif' font-weight='bold' font-size='20' fill='white'%3ES%3C/text%3E%3C/svg%3E\" type=\"image/svg+xml\">"

runtime:
  cache_dir: ./.cache/antora

antora:
  extensions:
    - require: ./content/lib/dev-mode.js
      enabled: false

output:
  dir: ./www
